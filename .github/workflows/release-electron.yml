name: Release Electron Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run electron:build

      - name: Get version from package.json
        id: version
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: List build output
        run: Get-ChildItem -Path release -Recurse -File | Select-Object FullName

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Paginita ${{ github.ref_name }}
          draft: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer to Release
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $metadataPath = "release\latest.yml"
          $assets = Get-ChildItem -Path release -File | Where-Object {
            $_.Name -like "*$version*.exe" -or
            $_.Name -like "*$version*.exe.blockmap"
          }

          if (-not (Test-Path $metadataPath)) {
            Write-Error "Updater metadata not found: $metadataPath"
            Get-ChildItem release
            exit 1
          }

          $installer = $assets | Where-Object { $_.Extension -eq ".exe" } | Select-Object -First 1
          if (-not $installer) {
            Write-Error "Installer for version $version not found in release output"
            Get-ChildItem release
            exit 1
          }

          $pathLine = Select-String -Path $metadataPath -Pattern '^path:\s*(.+)$'
          if (-not $pathLine) {
            Write-Error "Could not read installer path from $metadataPath"
            Get-Content $metadataPath
            exit 1
          }

          $publishedInstallerName = $pathLine.Matches[0].Groups[1].Value.Trim()
          if (-not $publishedInstallerName) {
            Write-Error "Could not read installer name from $metadataPath"
            Get-Content $metadataPath
            exit 1
          }

          $blockmap = $assets | Where-Object { $_.Name -like "*.exe.blockmap" } | Select-Object -First 1
          $uploadArgs = @(
            "$metadataPath#latest.yml",
            "$($installer.FullName)#$publishedInstallerName"
          )

          if ($blockmap) {
            $uploadArgs += "$($blockmap.FullName)#$publishedInstallerName.blockmap"
          }

          gh release upload ${{ github.ref_name }} $uploadArgs --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
